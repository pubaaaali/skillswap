{% extends "base.html" %}
{% block title %}Delete Skill{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="ss-card p-4">
        <h1 class="h4 fw-bold mb-2">Delete skill?</h1>
        <p>Are you sure you want to delete <strong>{{ skill.title }}</strong>? This cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'core:profile' username=user.username %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
